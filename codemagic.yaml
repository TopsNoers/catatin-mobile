workflows:
  ios-workflow:
    name: iOS Build Workflow
    # Uses a Mac instance to build your project
    instance_type: mac_mini_m2
    max_build_duration: 120
    
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      # Once you have an Apple Developer Account, you can set up your certificates 
      # in the Codemagic UI and uncomment this group to use them:
      # groups:
      #   - ios_credentials
      
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
          
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
          
      - name: Build iOS Application
        script: |
          # ---------------------------------------------------------------------
          # NOTE: Building for a physical device requires an Apple Developer Account
          # and a Provisioning Profile. Since we are hitting a Code Signing error, 
          # we will build for the iOS Simulator instead just to verify the code 
          # compiles successfully on a Mac.
          # ---------------------------------------------------------------------
          flutter build ios --debug --simulator
          
          # If you HAVE an Apple Developer account ($99/yr) and want to build a 
          # real .ipa file, you must configure iOS code signing in Codemagic. 
          # Once configured, comment out the line above and uncomment the line below:
          # flutter build ipa --release
          
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/iphonesimulator/*.app
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      
    # publishing:
